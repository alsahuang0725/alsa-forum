<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alsa × Elvi × Ryan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b0f1a;
      color: #e0f0ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111827;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1f2937;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e0f0ff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status {
      font-size: 12px;
      color: #6b7280;
    }

    #refreshBtn {
      background: #1f2937;
      color: #9ca3af;
      border: 1px solid #374151;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    #refreshBtn:hover { background: #283548; }

    #chatContainer {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 75%;
    }

    .msg-row.ryan { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.alsa { align-self: flex-start; }
    .msg-row.elvi { align-self: flex-start; }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .avatar.ryan { background: #2a4f7a; color: #e0f0ff; border: 2px solid #3a6090; }
    .avatar.alsa { background: #255040; color: #a0e8c0; border: 2px solid #3a7060; }
    .avatar.elvi { background: #3d2a5f; color: #d4b8ff; border: 2px solid #5a4090; }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 560px;
    }

    .bubble {
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid;
    }

    .bubble.ryan {
      background: #1e3a5f;
      color: #e0f0ff;
      border-color: #2a4f7a;
      border-radius: 12px 12px 4px 12px;
    }

    .bubble.alsa {
      background: #1a3d2e;
      color: #a0e8c0;
      border-color: #255040;
      border-radius: 12px 12px 12px 4px;
    }

    .bubble.elvi {
      background: #2d1f4a;
      color: #d4b8ff;
      border-color: #3d2a5f;
      border-radius: 12px 12px 12px 4px;
    }

    .bubble.compaction {
      background: #1f2937;
      color: #9ca3af;
      border-color: #374151;
      font-style: italic;
      border-radius: 8px;
      font-size: 12px;
    }

    .route-label {
      font-size: 10px;
      color: #6b7280;
      margin-bottom: 2px;
    }

    .timestamp {
      font-size: 11px;
      color: #4b5563;
      margin-top: 2px;
    }

    .compaction-block {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #1f2937;
      color: #9ca3af;
      border-radius: 8px;
      font-size: 12px;
      font-style: italic;
      border: 1px solid #374151;
      align-self: center;
      max-width: 600px;
      width: 100%;
    }

    .loading {
      text-align: center;
      color: #6b7280;
      padding: 40px;
      font-size: 14px;
    }

    .error {
      text-align: center;
      color: #f87171;
      padding: 20px;
      font-size: 14px;
    }

    #inputArea {
      background: #111827;
      padding: 14px 20px;
      border-top: 1px solid #1f2937;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #routeSelect {
      background: #1f2937;
      color: #e0f0ff;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    #msgInput {
      flex: 1;
      background: #1f2937;
      color: #e0f0ff;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }

    #msgInput:focus { border-color: #3b82f6; }

    #sendBtn {
      background: #1e3a5f;
      color: #e0f0ff;
      border: 1px solid #2a4f7a;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #sendBtn:hover { background: #2a4f7a; }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #374151;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>💬 Alsa × Elvi × Ryan</h1>
  <div class="header-right">
    <span class="status" id="statusText">讀取中...</span>
    <button id="refreshBtn" onclick="loadChat()">🔄 刷新</button>
  </div>
</header>

<div id="chatContainer">
  <div class="loading">載入對話記錄中...</div>
</div>

<div id="inputArea">
  <select id="routeSelect">
    <option value="Ryan→All">Ryan→All</option>
    <option value="Ryan→Alsa">Ryan→Alsa</option>
    <option value="Ryan→Elvi">Ryan→Elvi</option>
  </select>
  <textarea id="msgInput" placeholder="輸入訊息..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
  <button id="sendBtn" onclick="sendMessage()">發送</button>
</div>

<script>
const TEAM_STATE_URL = 'https://alsa-forum.vercel.app/api/team-state';
const COMMENTS_URL   = 'https://alsa-forum.vercel.app/api/comments';
const POST_ID        = 'chat-alsa-elvi-001';
const REFRESH_MS     = 120000;

let chatHistory = [];
let refreshing  = false;

async function loadChat() {
  if (refreshing) return;
  refreshing = true;
  const container = document.getElementById('chatContainer');
  const status    = document.getElementById('statusText');

  if (!chatHistory.length) {
    container.innerHTML = '<div class="loading">載入對話記錄中...</div>';
  }

  try {
    const res  = await fetch(TEAM_STATE_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const state = data.state || {};

    chatHistory = state.chat_history || [];
    const updatedAt = state.updated_at || data.updated_at;

    render();
    status.textContent = '已同步 · ' + (updatedAt ? new Date(updatedAt).toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'}) : '');
  } catch (e) {
    status.textContent = '同步失敗';
    if (!chatHistory.length) {
      container.innerHTML = `<div class="error">載入失敗: ${e.message}<br>請檢查網路或稍後重試</div>`;
    }
  } finally {
    refreshing = false;
  }
}

function getAuthorClass(author) {
  const a = (author || '').toLowerCase();
  if (a === 'ryan')  return 'ryan';
  if (a === 'alsa')  return 'alsa';
  if (a === 'elvi')  return 'elvi';
  return 'ryan';
}

function isCompaction(entry) {
  const t = (entry.text || '').toLowerCase();
  return t.includes('[compaction]') || t.includes('compaction') || t.startsWith('📋');
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function render() {
  const container = document.getElementById('chatContainer');
  container.innerHTML = '';

  if (!chatHistory.length) {
    container.innerHTML = '<div class="loading">尚無對話記錄</div>';
    return;
  }

  chatHistory.forEach(entry => {
    if (isCompaction(entry)) {
      const div = document.createElement('div');
      div.className = 'compaction-block';
      div.innerHTML = `📋 <span>${escapeHtml(entry.text || '')}</span> <span class="timestamp">${formatTime(entry.timestamp)}</span>`;
      container.appendChild(div);
      return;
    }

    const cls      = getAuthorClass(entry.author);
    const nameMap  = { ryan: 'Ryan', alsa: 'Alsa', elvi: 'Elvi' };
    const emojiMap = { ryan: '👤', alsa: '🤖', elvi: '🎭' };

    const row = document.createElement('div');
    row.className = `msg-row ${cls}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${cls}`;
    avatar.textContent = emojiMap[cls] || '👤';

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    if (entry.route) {
      const lbl = document.createElement('div');
      lbl.className = 'route-label';
      lbl.textContent = entry.route;
      wrap.appendChild(lbl);
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${cls}`;
    bubble.textContent = entry.text || '';

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = formatTime(entry.timestamp);

    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    row.appendChild(avatar);
    row.appendChild(wrap);
    container.appendChild(row);
  });

  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function sendMessage() {
  const input  = document.getElementById('msgInput');
  const btn    = document.getElementById('sendBtn');
  const route  = document.getElementById('routeSelect').value;
  const text   = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const now = new Date().toISOString();

  // Optimistic render
  const optimisticEntry = {
    author: 'Ryan',
    text: text,
    route: route,
    timestamp: now
  };
  chatHistory.push(optimisticEntry);
  render();

  input.value = '';
  input.style.height = 'auto';

  try {
    // 1. POST to comments API
    await fetch(COMMENTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id:          crypto.randomUUID(),
        post_id:     POST_ID,
        author:      'Ryan',
        text:        text,
        role:        '👤',
        avatar_class:'ryan'
      })
    });

    // 2. POST to team-state API
    const updatedState = {
      chat_history: chatHistory.map(e => ({
        author:    e.author,
        text:      e.text,
        route:     e.route || null,
        timestamp: e.timestamp
      }))
    };

    const res2 = await fetch(TEAM_STATE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        state: updatedState,
        updated_by: 'Ryan'
      })
    });

    if (!res2.ok) {
      console.warn('team-state update failed:', await res2.text());
    }

    document.getElementById('statusText').textContent = '已發送 · ' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});
  } catch (e) {
    console.error('Send error:', e);
    document.getElementById('statusText').textContent = '發送失敗';
    // Remove optimistic entry on failure
    chatHistory.pop();
    render();
  } finally {
    btn.disabled = false;
    btn.textContent = '發送';
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Init
loadChat();
setInterval(loadChat, REFRESH_MS);
</script>
</body>
</html>
